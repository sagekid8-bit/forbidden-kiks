<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<title>FORBIDDEN KIKS</title>
<style>
:root{--a:#ff4d7d;--b:#ff8a3d;--c:#8b5cf6;--d:#22d3ee;--e:#f59e0b;--muted:#c5bdd9}
*{box-sizing:border-box}
body{margin:0;font-family:Poppins,system-ui,-apple-system,Segoe UI,Roboto,Arial;color:#fff;background:radial-gradient(circle at top,#2a1248 0,#0b0615 30%,#05010a 70%,#020104 100%);min-height:100vh;overflow-x:hidden}
header{position:sticky;top:0;padding:18px 14px 14px;background:rgba(5,1,10,.82);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08);z-index:10}
.brand{text-align:center;margin:0;font-size:clamp(2rem,5vw,3.8rem);line-height:1;letter-spacing:3px;font-weight:900;background:linear-gradient(90deg,#ffffff 0%,#f7e7b0 28%,#d4af37 55%,#202020 100%);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 0 6px rgba(212,175,55,.25))}
.tagline{text-align:center;margin:10px 0 0;font-size:clamp(.9rem,2.2vw,1.15rem);letter-spacing:2px;text-transform:uppercase;color:#f2eefe}
.tagline span{display:inline-block;padding:7px 14px;border-radius:999px;background:linear-gradient(90deg,rgba(255,77,125,.18),rgba(139,92,246,.18),rgba(34,211,238,.18));border:1px solid rgba(255,255,255,.12)}
.top,.toolbar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.search{flex:1;min-width:220px;max-width:760px;padding:14px 16px;border-radius:16px;border:1px solid #322c47;background:#151222;color:#fff;font-size:16px;outline:none}
.btn{border:0;border-radius:16px;padding:13px 18px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--a),var(--b));cursor:pointer}
.ghost{background:#1b1730;border:1px solid #342b52}
.small{padding:11px 16px;border-radius:14px}
.wrap{padding:0;max-width:100vw;margin:0 auto;overflow:hidden}
.slider{display:flex;transition:transform .28s ease;will-change:transform;width:100%}
.page{min-width:100%;padding:14px;touch-action:pan-y}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.card{background:linear-gradient(180deg,rgba(24,19,38,.95),rgba(10,8,18,.98));border:1px solid rgba(255,255,255,.09);border-radius:22px;overflow:hidden}
.img{aspect-ratio:1/1;background:linear-gradient(135deg,rgba(255,77,125,.16),rgba(139,92,246,.16),rgba(34,211,238,.16));display:grid;place-items:center}
.img img{width:100%;height:100%;object-fit:cover}
.ph{color:#d6c7ff}
.pad{padding:12px}
.name{font-weight:900;font-size:1.02rem;margin-bottom:6px}
.meta{color:var(--muted);font-size:.92rem;line-height:1.35}
.price{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-weight:900}
.sale{color:#8bf1c4}
select,input[type=number],textarea,input[type=text]{width:100%;background:#141121;color:#fff;border:1px solid #342b52;border-radius:12px;padding:12px;font-size:15px}
.optline{display:flex;gap:8px}
.pager{display:flex;justify-content:center;gap:12px;align-items:center;color:#efe8ff;margin:18px 0 8px;padding:0 14px 20px;font-family:'Playfair Display',serif;font-size:.78rem;letter-spacing:.8px;text-align:center;text-shadow:0 0 18px rgba(139,92,246,.35)}
.pager span{background:linear-gradient(90deg,#ffffff 0%,#fff7d1 35%,#d4af37 70%,#a67c00 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
.hidden{display:none}
.panel,.overlay{display:none;position:fixed;inset:0;z-index:20}
.overlay{background:rgba(0,0,0,.62)}
.panel{display:block;left:auto;right:-100%;top:0;width:min(92vw,430px);height:100vh;transition:right .32s ease}
.panel.open{right:0}
.sheet{position:absolute;top:0;right:0;left:0;max-width:none;height:100vh;background:#0d0a14;border-left:1px solid rgba(255,255,255,.1);overflow:auto}
.sheet h2{margin:0;padding:16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sheet .content{padding:16px}
.item{display:grid;grid-template-columns:70px 1fr auto;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.item img{width:70px;height:70px;border-radius:14px;object-fit:cover;background:#111}
.qty{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.qty button{width:34px;height:34px;border-radius:10px;border:0;background:#241d3b;color:#fff;font-size:18px}
.adminbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.muted{color:var(--muted)}
.footerbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.row2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.draftitem{background:#12101d;border:1px solid #2f2748;border-radius:16px;padding:10px;margin-top:10px}
.drafthead{display:flex;justify-content:space-between;gap:10px;align-items:center}
.drafthead b{display:block}
.draftmeta{font-size:.9rem;color:var(--muted);margin-top:4px}
.adminproduct{background:#12101d;border:1px solid #2f2748;border-radius:16px;padding:10px;margin-top:10px}
.movebar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.bubblewrap{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.bubble{border:1px solid rgba(255,255,255,.14);background:#171326;color:#fff;border-radius:999px;padding:9px 12px;font-size:.88rem;cursor:pointer}
.bubble.active{background:linear-gradient(135deg,#ffffff,#d4af37);color:#120f18;border-color:#f3df9a}
.bubble.size{min-width:42px;text-align:center}
@media (min-width:700px){.grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media (min-width:1000px){.grid{grid-template-columns:repeat(4,minmax(0,1fr))}}
@media (max-width:520px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.row2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<h1 class="brand">FORBIDDEN KIKS</h1>
<p class="tagline"><span>Stay Flashy. Stay Rare.</span></p>
<div class="top"><input id="search" class="search" placeholder="Search shoes..."><button class="btn" onclick="openAdmin()">Admin</button></div>
<div class="toolbar"><button class="btn ghost small" onclick="openCart()">Cart <span id="cartCount">0</span></button><button class="btn ghost small" onclick="clearCart()">Clear Cart</button></div>
</header>
<div class="wrap" id="sliderWrap">
<div class="slider" id="slider">
<div class="page"><div id="grid" class="grid"></div></div>
</div>
<div class="pager"><span id="footerText">worry about delivery... Nah relax we got you</span></div>
</div>
<div id="mask" class="overlay" onclick="closePanels()"></div>
<div id="cart" class="panel"><div class="sheet"><h2>Cart</h2><div class="content"><div id="cartList"></div><div class="footerbar"><button class="btn ghost" onclick="clearCart()">Clear</button><button class="btn" onclick="goWhatsApp()">WhatsApp</button></div></div></div></div>
<div id="admin" class="panel"><div class="sheet"><h2>Admin</h2><div class="content"><div id="loginBox"><input id="pw" type="password" class="search" placeholder="Password" onkeydown="if(event.key==='Enter'){login()}"><div class="footerbar"><button class="btn admin-action" type="button" onclick="login()">Unlock</button><button class="btn ghost admin-action" type="button" onclick="closePanels()">Close</button></div></div><div id="adminBox" class="hidden"><div class="adminbar"><button class="btn ghost small admin-action" onclick="loadAdminProducts()">Load Products</button><button class="btn ghost small admin-action" onclick="toggleProducts()" id="productsToggleBtn">Hide Products</button><button class="btn ghost small admin-action" onclick="downloadMergedJSON()">Download products.json</button><button class="btn ghost small admin-action" onclick="logout()">Lock</button></div><div class="row2" style="margin-top:14px"><input id="aName" class="search edit-field" placeholder="Shoe name"><input id="aPrice" class="search edit-field" type="number" placeholder="Price"></div><input id="aSale" class="search edit-field" placeholder="Sale text"><input id="aImg" class="search edit-field" placeholder="Image URL"><textarea id="aDesc" rows="3" class="search edit-field" placeholder="Description"></textarea><div id="colorBubbles" class="bubblewrap"></div><div id="sizeBubbles" class="bubblewrap"></div><input id="aColors" class="search edit-field hidden" placeholder="Colors comma separated"><input id="aSizes" class="search edit-field hidden" placeholder="Sizes comma separated"><div class="footerbar"><button class="btn admin-action" onclick="saveProduct()">Save Product</button><button class="btn ghost admin-action" onclick="clearForm()">Clear Form</button><button class="btn ghost admin-action" onclick="toggleDrafts()" id="draftsToggleBtn">Hide Drafts</button></div><div class="muted" id="draftState" style="margin-top:10px">Drafts: 0</div><div id="draftList" style="margin-top:14px"></div><div class="muted" style="margin-top:18px">All Products</div><div id="adminProducts"></div></div></div></div></div>
<script>
const PASS='031005';
const SOURCE='products.json';
const DRAFT_KEY='fk_draft_products';
const FORM_KEY='fk_admin_form';
const HIDDEN_KEY='fk_hidden_products';
const STORE_KEY='fk_saved_products';
let products=[];
let cart=JSON.parse(localStorage.getItem('fk_cart')||'[]');
let draftProducts=JSON.parse(localStorage.getItem(DRAFT_KEY)||'[]');
let hiddenProducts=JSON.parse(localStorage.getItem(HIDDEN_KEY)||'[]');
let adminProducts=[];
let page=0,logged=false,editingIndex=-1,productsVisible=true,draftsVisible=true;
let swipeX=0,swiping=false,currentFocusId='aName';
const colorPool=['Black','White','Gold','Silver','Red','Blue','Green','Yellow','Orange','Purple','Pink','Brown','Beige','Cream','Grey','Charcoal','Navy','Teal','Turquoise','Mint','Olive','Maroon','Burgundy','Coral','Peach','Lime','Cyan','Magenta'];
const sizePool=[1,2,3,4,5,6,7,8];
const per=6,$=id=>document.getElementById(id);
function persistCart(){localStorage.setItem('fk_cart',JSON.stringify(cart))}
function persistDrafts(){localStorage.setItem(DRAFT_KEY,JSON.stringify(draftProducts));renderDrafts()}
function persistHidden(){localStorage.setItem(HIDDEN_KEY,JSON.stringify(hiddenProducts))}
function persistStore(){localStorage.setItem(STORE_KEY,JSON.stringify(adminProducts))}
function visibleProducts(){return adminProducts.filter(p=>!hiddenProducts.includes(productKey(p)))}
function filtered(){const q=$('search').value.trim().toLowerCase();return visibleProducts().filter(p=>!q||[p.name,p.desc,(p.colors||[]).join(' '),(p.sizes||[]).join(' ')].join(' ').toLowerCase().includes(q))}
function totalPages(){return Math.max(1,Math.ceil(filtered().length/per))}
function clampPage(){const max=Math.max(0,totalPages()-1);page=Math.max(0,Math.min(page,max))}
function render(){clampPage();const list=filtered(),slice=list.slice(page*per,page*per+per);$('grid').innerHTML=slice.length?slice.map(p=>{const idx=visibleProducts().indexOf(p);return `<div class='card'><div class='img'>${p.img?`<img src='${p.img}' alt='${p.name} image' onerror="this.style.display='none';this.parentElement.innerHTML='<div class=\\\\'ph\\\\'>Image failed</div>'">`:`<div class='ph'>No image</div>`}</div><div class='pad'><div class='name'>${p.name||''}</div><div class='meta'>${p.desc||''}</div><div class='price'><span>R${p.price||0}</span><span class='sale'>${p.sale||''}</span></div><div class='optline' style='margin-top:10px'><select id='c${idx}'>${(p.colors||[]).map(c=>`<option>${c}</option>`).join('')}</select><select id='s${idx}'>${(p.sizes||[]).map(s=>`<option>${s}</option>`).join('')}</select></div><div class='footerbar' style='display:flex;gap:10px;flex-wrap:wrap;margin-top:12px'><button class='btn small' onclick='addToCart(${idx})'>Add to cart</button></div></div></div>`;}).join(''):'<div class="muted">No products loaded yet.</div>';$('footerText').textContent='worry about delivery... Nah relax we got you';$('cartCount').textContent=cart.reduce((a,b)=>a+b.qty,0);renderCart();renderDrafts();renderAdminProducts();applyVisibility();updateSlider()}
function updateSlider(){$('slider').style.transform=`translateX(${-page*100}%)`}
function goPage(n){page=n;clampPage();updateSlider();render()}
function nextPage(){goPage(page+1)}
function prevPage(){goPage(page-1)}
function touchStart(e){swipeX=e.touches[0].clientX;swiping=true}
function touchEnd(e){if(!swiping)return;const dx=e.changedTouches[0].clientX-swipeX;if(Math.abs(dx)>50){if(dx<0)nextPage();else prevPage()}swiping=false}
function addToCart(i){const p=visibleProducts()[i],color=$('c'+i).value,size=$('s'+i).value,ex=cart.find(x=>x.i===i&&x.color===color&&x.size===size);if(ex)ex.qty++;else cart.push({i,name:p.name,price:p.price,color,size,img:p.img,qty:1});persistCart();render()}
function renderCart(){if(!$('cartList'))return;$('cartList').innerHTML=cart.length?cart.map((x,n)=>`<div class='item'><img src='${x.img||''}' onerror="this.style.display='none'"><div><div><b>${x.name}</b></div><div class='muted'>Color: ${x.color} • Size: ${x.size}</div><div class='muted'>R${x.price} x ${x.qty}</div></div><div class='qty'><button onclick='chg(${n},-1)'>-</button><span>${x.qty}</span><button onclick='chg(${n},1)'>+</button><button onclick='del(${n})'>x</button></div></div>`).join(''):'<div class="muted">Cart is empty.</div>'}
function chg(n,d){cart[n].qty+=d;if(cart[n].qty<1)cart.splice(n,1);persistCart();render()}
function del(n){cart.splice(n,1);persistCart();render()}
function clearCart(){cart=[];persistCart();render()}
function openCart(){$('mask').style.display='block';$('cart').classList.add('open')}
function openAdmin(){$('mask').style.display='block';$('admin').classList.add('open');setTimeout(()=>$('pw').focus(),0)}
function closePanels(){$('mask').style.display='none';$('cart').classList.remove('open');$('admin').classList.remove('open')}
function login(){if($('pw').value===PASS){logged=true;$('loginBox').classList.add('hidden');$('adminBox').classList.remove('hidden');loadFormDraft();loadAdminProducts();renderDrafts();renderAdminProducts()}else alert('Wrong password')}
function logout(){logged=false;$('loginBox').classList.remove('hidden');$('adminBox').classList.add('hidden');$('pw').value=''}
function focusField(id){currentFocusId=id;setTimeout(()=>{$(currentFocusId)?.focus()},0)}
function formData(){return {name:$('aName').value.trim(),price:$('aPrice').value,sale:$('aSale').value.trim(),img:$('aImg').value.trim(),desc:$('aDesc').value.trim(),colors:$('aColors').value,sizes:$('aSizes').value}}
function setForm(d){$('aName').value=d.name||'';$('aPrice').value=d.price||'';$('aSale').value=d.sale||'';$('aImg').value=d.img||'';$('aDesc').value=d.desc||'';$('aColors').value=Array.isArray(d.colors)?d.colors.join(', '):(d.colors||'');$('aSizes').value=Array.isArray(d.sizes)?d.sizes.join(', '):(d.sizes||'');syncBubbles()}
function clearForm(){setForm({name:'',price:'',sale:'',img:'',desc:'',colors:'',sizes:''});localStorage.removeItem(FORM_KEY);editingIndex=-1;focusField('aName')}
function saveFormDraft(){localStorage.setItem(FORM_KEY,JSON.stringify(formData()))}
function loadFormDraft(){try{setForm(JSON.parse(localStorage.getItem(FORM_KEY)||'{}'))}catch(e){}}
function normalizeDraft(d){return {name:d.name||'New Shoe',price:parseFloat(d.price||0)||0,sale:d.sale||'',img:d.img||'',desc:d.desc||'',colors:(d.colors||'').split(',').map(s=>s.trim()).filter(Boolean),sizes:(d.sizes||'').split(',').map(s=>parseInt(s.trim())).filter(n=>!isNaN(n))}}
function productKey(p){return [String(p.name||'').trim().toLowerCase(),String(p.img||'').trim().toLowerCase()].join('||')}
function saveProduct(){if(!logged){alert('Unlock admin first');return}const d=normalizeDraft(formData());if(!d.name){alert('Name is required');return}if(d.price===''||Number.isNaN(d.price)){alert('Price is required');return}if(!d.colors.length)d.colors=['Black','White'];if(!d.sizes.length)d.sizes=[1,2,3,4,5,6,7,8];if(editingIndex>=0&&adminProducts[editingIndex])adminProducts[editingIndex]=d;else adminProducts.push(d);persistStore();products=visibleProducts();editingIndex=-1;saveFormDraft();render();focusField('aName');alert('Saved')}
function editProduct(i){editingIndex=i;setForm(visibleProducts()[i]);focusField('aName');saveFormDraft()}
function moveUp(i){if(i<=0)return;const t=adminProducts[i-1];adminProducts[i-1]=adminProducts[i];adminProducts[i]=t;persistStore();products=visibleProducts();render()}
function moveDown(i){if(i>=adminProducts.length-1)return;const t=adminProducts[i+1];adminProducts[i+1]=adminProducts[i];adminProducts[i]=t;persistStore();products=visibleProducts();render()}
function moveToTop(i){const item=adminProducts.splice(i,1)[0];adminProducts.unshift(item);persistStore();products=visibleProducts();render()}
function moveToBottom(i){const item=adminProducts.splice(i,1)[0];adminProducts.push(item);persistStore();products=visibleProducts();render()}
function hideFromAdmin(i){const key=productKey(visibleProducts()[i]);if(!hiddenProducts.includes(key))hiddenProducts.push(key);persistHidden();products=visibleProducts();render()}
function deleteProduct(i){if(confirm('Delete this product completely?')){const key=productKey(visibleProducts()[i]);const index=adminProducts.findIndex(p=>productKey(p)===key);if(index>=0)adminProducts.splice(index,1);hiddenProducts=hiddenProducts.filter(k=>k!==key);persistHidden();persistStore();products=visibleProducts();if(editingIndex===index)editingIndex=-1;render()}}
function renderDrafts(){if(!$('draftList'))return;$('draftState').textContent='Drafts: '+draftProducts.length;if(!logged||!draftsVisible){$('draftList').innerHTML='';return}$('draftList').innerHTML=draftProducts.length?draftProducts.map((p,i)=>`<div class='draftitem'><div class='drafthead'><div><b>${p.name}</b><div class='draftmeta'>R${p.price} • ${p.sale||''}</div></div><div class='footerbar' style='margin-top:0'><button class='btn ghost small admin-action' onclick='editDraft(${i})'>Edit</button><button class='btn ghost small admin-action' onclick='removeDraft(${i})'>Remove</button></div></div></div>`).join(''):'<div class="muted">No drafts yet.</div>'}
function editDraft(i){setForm(draftProducts[i]);focusField('aName');saveFormDraft()}
function removeDraft(i){if(confirm('Remove this draft?')){draftProducts.splice(i,1);persistDrafts()}}
function clearDrafts(){if(confirm('Clear all drafts?')){draftProducts=[];persistDrafts()}}
function toggleDrafts(){draftsVisible=!draftsVisible;$('draftsToggleBtn').textContent=draftsVisible?'Hide Drafts':'Show Drafts';renderDrafts()}
function loadAdminProducts(){const saved=JSON.parse(localStorage.getItem(STORE_KEY)||'null');if(saved&&Array.isArray(saved.products)){adminProducts=saved.products}else{fetch(SOURCE).then(r=>r.json()).then(data=>{const base=Array.isArray(data.products)?data.products:(Array.isArray(data)?data:[]);adminProducts=base;persistStore();products=visibleProducts();render()}).catch(()=>{adminProducts=[];render()});return}products=visibleProducts();render()}
function applyVisibility(){const el=$('adminProducts');if(el)el.style.display=productsVisible?'block':'none'}
function toggleProducts(){productsVisible=!productsVisible;$('productsToggleBtn').textContent=productsVisible?'Hide Products':'Show Products';applyVisibility()}
function closeProducts(){toggleProducts()}
function renderAdminProducts(){const box=$('adminProducts');if(!box)return;box.innerHTML=visibleProducts().map((p,i)=>`<div class='adminproduct'><div class='drafthead'><div><b>${p.name}</b><div class='draftmeta'>Edit product details below</div></div></div><input class='search edit-field' style='margin-top:10px' value='${p.name||''}' onfocus="currentFocusId='aName'" oninput="updateAdminFieldByKey('${productKey(p)}', 'name', this.value)" placeholder='Name'><input class='search edit-field' style='margin-top:10px' type='number' value='${p.price ?? ''}' onfocus="currentFocusId='aPrice'" oninput="updateAdminFieldByKey('${productKey(p)}', 'price', this.value)" placeholder='Price'><input class='search edit-field' style='margin-top:10px' value='${p.sale || ''}' onfocus="currentFocusId='aSale'" oninput="updateAdminFieldByKey('${productKey(p)}', 'sale', this.value)" placeholder='Sale'><input class='search edit-field' style='margin-top:10px' value='${p.img || ''}' onfocus="currentFocusId='aImg'" oninput="updateAdminFieldByKey('${productKey(p)}', 'img', this.value)" placeholder='Image URL'><input class='search edit-field' style='margin-top:10px' value='${p.desc || ''}' onfocus="currentFocusId='aDesc'" oninput="updateAdminFieldByKey('${productKey(p)}', 'desc', this.value)" placeholder='Description'><input class='search edit-field' style='margin-top:10px' value='${(p.colors || []).join(', ')}' onfocus="currentFocusId='aColors'" oninput="updateAdminFieldByKey('${productKey(p)}', 'colors', this.value)" placeholder='Colors comma separated'><input class='search edit-field' style='margin-top:10px' value='${(p.sizes || []).join(', ')}' onfocus="currentFocusId='aSizes'" oninput="updateAdminFieldByKey('${productKey(p)}', 'sizes', this.value)" placeholder='Sizes comma separated'><div class='movebar'><button class='btn ghost small admin-action' onclick='editProductByKey("${productKey(p)}")'>Edit</button><button class='btn ghost small admin-action' onclick='saveProduct()'>Save</button><button class='btn ghost small admin-action' onclick='hideFromAdminByKey("${productKey(p)}")'>Remove</button><button class='btn ghost small admin-action' onclick='deleteProductByKey("${productKey(p)}")'>Delete</button><button class='btn ghost small admin-action' onclick='moveUpByKey("${productKey(p)}")'>Up</button><button class='btn ghost small admin-action' onclick='moveDownByKey("${productKey(p)}")'>Down</button><button class='btn ghost small admin-action' onclick='moveToTopByKey("${productKey(p)}")'>Top</button><button class='btn ghost small admin-action' onclick='moveToBottomByKey("${productKey(p)}")'>Bottom</button></div></div>`).join('');applyVisibility();bindAdminButtons()}
function bindAdminButtons(){document.querySelectorAll('.admin-action').forEach(btn=>{btn.onmousedown=e=>e.preventDefault();btn.ontouchstart=e=>e.preventDefault()})}
function findIndexByKey(key){return adminProducts.findIndex(p=>productKey(p)===key)}
function updateAdminFieldByKey(key, field, value){const index=findIndexByKey(key);if(index<0)return;updateAdminField(index,field,value);persistStore();products=visibleProducts()}
function editProductByKey(key){const index=findIndexByKey(key);if(index>=0)editProduct(index)}
function hideFromAdminByKey(key){const index=findIndexByKey(key);if(index>=0)hideFromAdmin(index)}
function deleteProductByKey(key){const index=findIndexByKey(key);if(index>=0)deleteProduct(index)}
function moveUpByKey(key){const index=findIndexByKey(key);if(index>=0)moveUp(index)}
function moveDownByKey(key){const index=findIndexByKey(key);if(index>=0)moveDown(index)}
function moveToTopByKey(key){const index=findIndexByKey(key);if(index>=0)moveToTop(index)}
function moveToBottomByKey(key){const index=findIndexByKey(key);if(index>=0)moveToBottom(index)}
function updateAdminField(index, field, value){if(!adminProducts[index])return;if(field==='price')adminProducts[index][field]=Number(value);else if(field==='colors')adminProducts[index][field]=value.split(',').map(v=>v.trim()).filter(Boolean);else if(field==='sizes')adminProducts[index][field]=value.split(',').map(v=>Number(v.trim())).filter(v=>!Number.isNaN(v));else adminProducts[index][field]=value}
function downloadJSON(data){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='products.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function downloadMergedJSON(){downloadJSON({products:adminProducts})}
function goWhatsApp(){if(!cart.length){alert('Cart is empty');return}const text='FORBIDDEN KIKS Order:%0A'+cart.map(x=>`- ${x.name} | Color: ${x.color} | Size: ${x.size} | Qty: ${x.qty} | R${x.price*x.qty}`).join('%0A')+'%0ATotal: R'+cart.reduce((a,b)=>a+b.price*b.qty,0);window.open(`https://wa.me/27686598721?text=${encodeURIComponent(text)}`,'_blank')}
function syncBubbles(){const cb=$('colorBubbles'),sb=$('sizeBubbles');if(!cb||!sb)return;const selectedColors=new Set(($('aColors').value||'').split(',').map(s=>s.trim()).filter(Boolean));const selectedSizes=new Set(($('aSizes').value||'').split(',').map(s=>s.trim()).filter(Boolean));cb.innerHTML='<div class="muted" style="width:100%">Pick colours</div>'+colorPool.map(c=>`<button type="button" class="bubble ${selectedColors.has(c)?'active':''}" onclick="toggleColor('${c}')">${c}</button>`).join('');sb.innerHTML='<div class="muted" style="width:100%">Pick sizes 1 to 8</div>'+sizePool.map(s=>`<button type="button" class="bubble size ${selectedSizes.has(String(s))?'active':''}" onclick="toggleSize(${s})">${s}</button>`).join('')}
function toggleColor(c){const arr=$('aColors').value.split(',').map(s=>s.trim()).filter(Boolean);const i=arr.indexOf(c);if(i>=0)arr.splice(i,1);else arr.push(c);$('aColors').value=arr.join(', ');saveFormDraft();syncBubbles()}
function toggleSize(s){const arr=$('aSizes').value.split(',').map(v=>v.trim()).filter(Boolean);const v=String(s);const i=arr.indexOf(v);if(i>=0)arr.splice(i,1);else arr.push(v);$('aSizes').value=arr.join(', ');saveFormDraft();syncBubbles()}
function initActions(){document.querySelectorAll('.admin-action').forEach(btn=>{btn.addEventListener('mousedown',e=>e.preventDefault());btn.addEventListener('touchstart',e=>e.preventDefault())});document.querySelectorAll('.edit-field').forEach(inp=>{inp.addEventListener('focus',()=>currentFocusId=inp.id);inp.addEventListener('input',()=>{saveFormDraft();syncBubbles()})});syncBubbles()}
['aName','aPrice','aSale','aImg','aDesc','aColors','aSizes'].forEach(id=>$(id).addEventListener('focus',()=>currentFocusId=id));['aName','aPrice','aSale','aImg','aDesc','aColors','aSizes'].forEach(id=>$(id).addEventListener('input',saveFormDraft));$('search').addEventListener('input',()=>{page=0;render()});$('sliderWrap').addEventListener('touchstart',touchStart,{passive:true});$('sliderWrap').addEventListener('touchend',touchEnd,{passive:true});fetch(SOURCE).then(r=>r.json()).then(data=>{const base=Array.isArray(data.products)?data.products:(Array.isArray(data)?data:[]);const stored=JSON.parse(localStorage.getItem(STORE_KEY)||'null');adminProducts=stored&&Array.isArray(stored.products)?stored.products:base;products=visibleProducts();render();initActions()}).catch(()=>{adminProducts=[];render();initActions()})
</script>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FORBIDDEN STORE — Admin</title>
<style>
:root{--a:#ff4d7d;--b:#ff8a3d;--c:#8b5cf6;--d:#22d3ee;--e:#f59e0b;--muted:#c5bdd9;--line:rgba(255,255,255,.09);--green:#8bf1c4;--text:#fff;--shadow:0 16px 40px rgba(0,0,0,.35)}
*{box-sizing:border-box}html,body{margin:0;padding:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;color:var(--text);background:radial-gradient(circle at top,#2a1248 0,#0b0615 34%,#05010a 72%,#020104 100%);min-height:100%}
button,input,select,textarea{font:inherit}a{text-decoration:none;color:inherit}
header{position:sticky;top:0;z-index:20;background:rgba(5,1,10,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.topbar{max-width:1100px;margin:0 auto;padding:12px}
.brandrow{display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{margin:0;font-size:clamp(1.4rem,4vw,2.2rem);font-weight:1000;letter-spacing:2px;background:linear-gradient(90deg,var(--a),var(--b),var(--e),var(--d),var(--c),var(--a));-webkit-background-clip:text;background-clip:text;color:transparent}
.iconbtn{border:1px solid rgba(255,255,255,.12);background:#161325;color:#fff;border-radius:14px;padding:10px 14px;cursor:pointer}
.tagline{margin:6px 0 0;text-align:center;font-size:.85rem;letter-spacing:1.5px;text-transform:uppercase;color:#f2eefe}
.tagline span{display:inline-block;padding:5px 12px;border-radius:999px;background:linear-gradient(90deg,rgba(255,77,125,.18),rgba(139,92,246,.18),rgba(34,211,238,.18));border:1px solid rgba(255,255,255,.12)}
.wrap{max-width:1100px;margin:0 auto;padding:12px}
.card{background:linear-gradient(180deg,rgba(24,19,38,.97),rgba(10,8,18,.99));border:1px solid var(--line);border-radius:22px;padding:16px;margin-bottom:14px}
.btn{border:0;border-radius:14px;padding:11px 16px;font-weight:800;color:#fff;cursor:pointer;background:linear-gradient(135deg,var(--a),var(--b));box-shadow:var(--shadow)}
.btn.green{background:linear-gradient(135deg,#10b981,#059669)}
.btn2{background:#1b1730;border:1px solid #372d57}
.btn.danger{background:linear-gradient(135deg,#ef4444,#b91c1c)}
.btnbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.search{width:100%;padding:12px 14px;border-radius:14px;border:1px solid #33294f;background:#151222;color:#fff;font-size:15px;outline:none}
select,input[type=number],input[type=text],textarea{width:100%;background:#141121;color:#fff;border:1px solid #342b52;border-radius:12px;padding:11px;font-size:15px;outline:none}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.label{font-size:.8rem;color:var(--muted);margin-bottom:4px;display:block;letter-spacing:.5px;text-transform:uppercase}
.field{margin-bottom:12px}
.hidden{display:none}
.muted{color:var(--muted)}
.sep{height:1px;background:var(--line);margin:16px 0}

/* Preview card */
.preview-wrap{position:sticky;top:80px}
.preview-card{border-radius:20px;overflow:hidden;background:linear-gradient(180deg,rgba(24,19,38,.97),rgba(10,8,18,.99));border:1px solid var(--line);box-shadow:var(--shadow)}
.preview-img{aspect-ratio:1/1;background:linear-gradient(135deg,rgba(255,77,125,.14),rgba(139,92,246,.14),rgba(34,211,238,.14));display:grid;place-items:center;overflow:hidden;position:relative}
.preview-img img{width:100%;height:100%;object-fit:cover}
.preview-badge{position:absolute;top:10px;left:10px;background:linear-gradient(135deg,var(--a),var(--b));padding:6px 10px;border-radius:999px;font-weight:900;font-size:.72rem}
.preview-pad{padding:12px}
.preview-name{font-weight:900;font-size:1rem;margin-bottom:4px}
.preview-desc{color:var(--muted);font-size:.88rem;min-height:32px}
.preview-price{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-weight:900}
.preview-cat{color:var(--green);font-size:.85rem}
.preview-swatches{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.swatch{width:13px;height:13px;border-radius:50%;border:1px solid rgba(255,255,255,.2)}

/* Color grid */
.colorGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-height:200px;overflow-y:auto;border:1px solid var(--line);border-radius:14px;padding:8px;background:rgba(0,0,0,.2)}
.colorOpt{display:flex;align-items:center;gap:6px;font-size:.88rem;cursor:pointer}
.colorDot{width:13px;height:13px;border-radius:50%;border:1px solid rgba(255,255,255,.2);flex-shrink:0}
.checkRow label{display:flex;align-items:center;gap:8px;font-size:.9rem;cursor:pointer}

/* Size grid */
.sizeGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.sizeBtn{border:1px solid var(--line);border-radius:10px;padding:8px 4px;text-align:center;cursor:pointer;font-size:.88rem;background:rgba(255,255,255,.03);transition:background .15s,border-color .15s}
.sizeBtn.on{background:linear-gradient(135deg,rgba(255,77,125,.3),rgba(139,92,246,.3));border-color:var(--a)}

/* Product list */
.prodCard{border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(255,255,255,.02);margin-bottom:8px;cursor:grab;user-select:none;transition:opacity .2s,box-shadow .2s}
.prodCard:active{cursor:grabbing}
.prodCard.dragging{opacity:.4;box-shadow:0 0 0 2px var(--a)}
.prodCard.dragover{box-shadow:0 -2px 0 0 var(--d)}
.prodCard.hidden-item{opacity:.45}
.prodCard.selected{border-color:var(--a);background:rgba(255,77,125,.07)}
.prodTop{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.prodThumb{width:52px;height:52px;border-radius:10px;object-fit:cover;background:#111;flex-shrink:0}
.prodInfo{flex:1;min-width:0}
.prodName{font-weight:900;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prodMeta{color:var(--muted);font-size:.82rem;margin-top:2px}
.badge{display:inline-block;padding:4px 9px;border-radius:999px;font-size:.72rem;font-weight:900;background:linear-gradient(135deg,var(--a),var(--b))}
.badge.gray{background:#2e2a45}
.badge.blue{background:linear-gradient(135deg,var(--c),var(--d))}
.prodActions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.smallbtn{border:0;border-radius:10px;padding:8px 12px;font-weight:700;cursor:pointer;color:#fff;background:#241d3b;font-size:.82rem}
.smallbtn.primary{background:linear-gradient(135deg,var(--a),var(--b))}
.smallbtn.danger{background:linear-gradient(135deg,#ef4444,#b91c1c)}

/* Status bar */
.statusbar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:14px;background:#0f0c1a;border:1px solid var(--line);font-size:.88rem;margin-bottom:12px}
.dot{width:8px;height:8px;border-radius:50%;background:#ef4444;flex-shrink:0}
.dot.saved{background:#10b981}
.dot.saving{background:var(--e);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Bulk bar */
.bulkbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 14px;border-radius:14px;background:rgba(255,77,125,.1);border:1px solid rgba(255,77,125,.3);margin-bottom:12px}

.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px}
.tab{border:0;background:transparent;color:var(--muted);padding:10px 14px;cursor:pointer;border-bottom:2px solid transparent;font-weight:700;font-size:.9rem;transition:color .15s}
.tab.active{color:#fff;border-bottom-color:var(--a)}

.layout{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:900px){.layout{grid-template-columns:1fr 340px}}
@media(max-width:700px){.row2,.row3{grid-template-columns:1fr}.colorGrid{grid-template-columns:repeat(2,1fr)}.sizeGrid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<header>
  <div class="topbar">
    <div class="brandrow">
      <h1 class="brand">FORBIDDEN STORE</h1>
      <button class="iconbtn" onclick="location.href='index.html'">← Store</button>
    </div>
    <p class="tagline"><span>Admin Panel</span></p>
  </div>
</header>

<div class="wrap">
  <!-- LOGIN -->
  <div id="loginBox" class="card">
    <div class="field"><label class="label">Admin Password</label><input id="pw" type="password" class="search" placeholder="Enter password..." onkeydown="if(event.key==='Enter')login()"></div>
    <div class="btnbar">
      <button class="btn" onclick="login()">Unlock Admin</button>
      <button class="btn btn2" onclick="location.href='index.html'">Back to Store</button>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="adminBox" class="hidden">

    <div class="statusbar">
      <div id="statusDot" class="dot saved"></div>
      <span id="statusMsg">All changes saved — store updates instantly</span>
      <button class="smallbtn" onclick="reloadProducts()" style="margin-left:auto;flex-shrink:0">🔄 Load Products</button>
      <span style="color:var(--muted);flex-shrink:0" id="productCountTop">0 products</span>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('editor',this)">✏️ Add / Edit Product</button>
      <button class="tab" onclick="switchTab('products',this)">📦 All Products</button>
    </div>

    <!-- ── EDITOR TAB ───────────────────────────────────────────── -->
    <div id="tabEditor" class="layout">

      <!-- Form column -->
      <div>
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <b id="editorTitle">New Product</b>
            <span id="editingBadge" class="badge blue hidden">Editing</span>
          </div>

          <div class="row2">
            <div class="field"><label class="label">Product Name</label><input id="aName" type="text" placeholder="e.g. Nike Air Max" oninput="saveFormDraft();updatePreview()"></div>
            <div class="field"><label class="label">Price (R)</label><input id="aPrice" type="number" placeholder="0" oninput="saveFormDraft();updatePreview()"></div>
          </div>

          <div class="row2">
            <div class="field">
              <label class="label">Main Category</label>
              <select id="aMainCategory" onchange="syncSubCats();syncSizeOptions();saveFormDraft();updatePreview()">
                <option>Shoes</option><option>Men</option><option>Women</option><option>Kids</option>
                <option>Accessories</option><option>New In</option><option>Trending</option><option>Sale</option><option>All Items</option>
              </select>
            </div>
            <div class="field"><label class="label">Sub Category</label><select id="aSubCategory" onchange="saveFormDraft();updatePreview()"></select></div>
          </div>

          <div class="row2">
            <div class="field">
              <label class="label">Visibility</label>
              <select id="aVisible" onchange="saveFormDraft();updatePreview()">
                <option value="true">✅ Visible in store</option>
                <option value="false">🙈 Hidden from store</option>
              </select>
            </div>
            <div class="field"><label class="label">Sale / Badge Text</label><input id="aSale" type="text" placeholder="e.g. 20% OFF" oninput="saveFormDraft();updatePreview()"></div>
          </div>

          <div class="field"><label class="label">Image URL</label><input id="aImg" type="text" placeholder="https://..." oninput="saveFormDraft();updatePreview()"></div>
          <div class="field"><label class="label">Description</label><textarea id="aDesc" rows="2" placeholder="Short product description..." oninput="saveFormDraft();updatePreview()"></textarea></div>

          <div class="sep"></div>

          <!-- Colors -->
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <b style="font-size:.9rem">Colors</b>
            <div style="display:flex;gap:6px">
              <button class="smallbtn" onclick="selectAllColors()">All</button>
              <button class="smallbtn" onclick="clearColors()">Clear</button>
            </div>
          </div>
          <div id="colorGrid" class="colorGrid"></div>

          <div class="sep"></div>

          <!-- Sizes -->
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <b style="font-size:.9rem" id="sizeLabel">Sizes</b>
            <div style="display:flex;gap:6px">
              <button class="smallbtn" onclick="selectAllSizes()">All</button>
              <button class="smallbtn" onclick="clearSizes()">Clear</button>
            </div>
          </div>
          <div id="sizeGrid" class="sizeGrid"></div>

          <div class="sep"></div>

          <div class="btnbar">
            <button class="btn green" onclick="saveProduct()">💾 Save Product</button>
            <button class="btn btn2" onclick="clearForm()">Clear Form</button>
            <button id="cancelEditBtn" class="btn btn2 hidden" onclick="cancelEdit()">Cancel Edit</button>
          </div>
        </div>
      </div>

      <!-- Preview column -->
      <div class="preview-wrap">
        <div style="font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Live Preview</div>
        <div class="preview-card">
          <div class="preview-img" id="previewImg">
            <div class="muted" style="text-align:center;padding:20px;font-size:.9rem">Enter image URL to preview</div>
          </div>
          <div class="preview-pad">
            <div class="preview-name" id="previewName">Product Name</div>
            <div class="preview-desc" id="previewDesc">Description...</div>
            <div class="preview-price">
              <span id="previewPrice">R0</span>
              <span class="preview-cat" id="previewCat">Category</span>
            </div>
            <div class="preview-swatches" id="previewSwatches"></div>
          </div>
        </div>
      </div>

    </div>

    <!-- ── PRODUCTS TAB ─────────────────────────────────────────── -->
    <div id="tabProducts" class="hidden">

      <!-- Search & filter -->
      <div class="card" style="padding:12px">
        <div class="row2">
          <input id="searchAdmin" class="search" placeholder="Search products..." oninput="renderProductList()">
          <select id="filterCat" onchange="renderProductList()">
            <option value="">All categories</option>
            <option>Shoes</option><option>Men</option><option>Women</option><option>Kids</option>
            <option>Accessories</option><option>New In</option><option>Trending</option><option>Sale</option>
          </select>
        </div>
        <div class="row2" style="margin-top:8px">
          <select id="filterVis" onchange="renderProductList()">
            <option value="">All visibility</option>
            <option value="visible">Visible only</option>
            <option value="hidden">Hidden only</option>
          </select>
          <div style="display:flex;gap:6px;align-items:center">
            <label style="display:flex;align-items:center;gap:6px;font-size:.88rem;cursor:pointer">
              <input type="checkbox" id="selectAll" onchange="toggleSelectAll()"> Select all
            </label>
          </div>
        </div>
      </div>

      <!-- Bulk actions bar (shows when items selected) -->
      <div id="bulkBar" class="bulkbar hidden">
        <b id="bulkCount">0 selected</b>
        <button class="smallbtn" onclick="bulkHide()">Hide selected</button>
        <button class="smallbtn" onclick="bulkUnhide()">Unhide selected</button>
        <button class="smallbtn danger" onclick="bulkDelete()">Delete selected</button>
        <button class="smallbtn" onclick="clearSelection()">Clear</button>
      </div>

      <div id="productList"></div>
    </div>

  </div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const PASS = '031005';
const STORE_KEY = 'fk_all_products_v2';
const FORM_KEY  = 'fk_admin_form_v3';
const $ = id => document.getElementById(id);

const COLOR_OPTIONS = [
  ['Black','#111'],['White','#f5f5f5'],['Grey','#94a3b8'],['Silver','#c0c0c0'],
  ['Red','#ef4444'],['Blue','#3b82f6'],['Navy','#1e3a8a'],['Green','#22c55e'],
  ['Olive','#808000'],['Yellow','#facc15'],['Gold','#d4af37'],['Orange','#fb923c'],
  ['Pink','#ec4899'],['Purple','#8b5cf6'],['Beige','#e7d3b0'],['Brown','#8b5a2b'],
  ['Tan','#d2b48c'],['Cream','#fffdd0'],['Burgundy','#800020'],['Maroon','#800000'],
  ['Teal','#14b8a6'],['Turquoise','#40e0d0'],['Mint','#98ff98'],['Coral','#ff7f50'],
  ['Lavender','#e6e6fa'],['Plum','#8e4585'],['Wine','#722f37'],['Rust','#b7410e'],
  ['Khaki','#c3b091'],['Lime','#a3e635'],['Charcoal','#36454f'],['Ivory','#fffff0'],
  ['All','#888'],['Customized','linear-gradient(135deg,#ff4d7d,#8b5cf6)']
];

const COLOR_MAP = Object.fromEntries(COLOR_OPTIONS.map(([n,c])=>[n,c]));

const SUB_CATS = {
  Shoes:['Sneakers','Slides','Boots','Formal','Trainers','All Items'],
  Men:['Tops','Bottoms','Sets','Shoes','Accessories','All Items'],
  Women:['Tops','Bottoms','Sets','Dresses','Shoes','Accessories','All Items'],
  Kids:['Tops','Bottoms','Sets','Shoes','Accessories','All Items'],
  Accessories:['Bags','Belts','Hats','Socks','Jewelry','Other','All Items'],
  default:['All Items']
};

const SHOE_SIZES  = ['1','2','3','4','5','6','7','8'];
const CLOTH_SIZES = ['XXS','XS','S','M','L','XL','XXL','One Size'];

// ── State ────────────────────────────────────────────────────────────────────
let logged = false;
let allProducts = [];
let editingId = null;          // null = new product
let selectedIds = new Set();
let selectedColors = new Set();
let selectedSizes = new Set();
let saveTimer = null;
let dragSrcIdx = null;

// ── Bootstrap ─────────────────────────────────────────────────────────────────
(function init(){
  const stored = localStorage.getItem(STORE_KEY);
  if(stored){
    try{ allProducts = JSON.parse(stored) || []; }catch(e){ allProducts = []; }
  }
  // Ensure all products have IDs and string sizes
  allProducts = allProducts.map(p => ({
    ...p,
    id: p.id || uid(),
    sizes: (p.sizes||[]).map(String),
    visible: p.visible !== false
  }));
})();

// ── Utils ────────────────────────────────────────────────────────────────────
function uid(){ return 'p_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8) }

function persist(){
  localStorage.setItem(STORE_KEY, JSON.stringify(allProducts));
  // Trigger store page to reload (cross-tab)
  localStorage.setItem('fk_store_updated', Date.now().toString());
}

function setStatus(msg, state='saved'){
  $('statusDot').className = 'dot ' + state;
  $('statusMsg').textContent = msg;
  $('productCountTop').textContent = allProducts.length + ' products';
}

function debounceSave(){
  setStatus('Saving…', 'saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    persist();
    setStatus('All changes saved — store updates instantly','saved');
  }, 600);
}

// ── Reload products from storage (Load Products button) ──────────────────────
function reloadProducts(){
  try{
    const stored = localStorage.getItem(STORE_KEY);
    if(stored){
      allProducts = JSON.parse(stored)||[];
      allProducts = allProducts.map(p=>({...p,id:p.id||uid(),sizes:(p.sizes||[]).map(String),visible:p.visible!==false}));
    }
  }catch(e){allProducts=[];}
  renderProductList();
  setStatus('Products reloaded from live store ✓','saved');
}

// ── Auth ──────────────────────────────────────────────────────────────────────
function login(){
  if($('pw').value === PASS){
    logged = true;
    $('loginBox').classList.add('hidden');
    $('adminBox').classList.remove('hidden');
    buildColorGrid();
    syncSubCats();
    syncSizeOptions();
    loadFormDraft();
    renderProductList();
    setStatus('All changes saved — store updates instantly','saved');
    $('productCountTop').textContent = allProducts.length + ' products';
  } else {
    alert('Wrong password');
    $('pw').value='';
    $('pw').focus();
  }
}
$('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });

// ── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(tab, btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  $('tabEditor').classList.toggle('hidden', tab!=='editor');
  $('tabProducts').classList.toggle('hidden', tab!=='products');
  if(tab==='products') renderProductList();
}

// ── Color grid ────────────────────────────────────────────────────────────────
function buildColorGrid(){
  $('colorGrid').innerHTML = COLOR_OPTIONS.map(([name,color])=>`
    <label class="colorOpt">
      <input type="checkbox" value="${name}" onchange="toggleColor('${name}',this.checked)">
      <span class="colorDot" style="background:${color}"></span>
      <span>${name}</span>
    </label>`).join('');
}

function toggleColor(name, on){
  on ? selectedColors.add(name) : selectedColors.delete(name);
  saveFormDraft(); updatePreview();
}
function selectAllColors(){ selectedColors = new Set(COLOR_OPTIONS.map(x=>x[0])); syncColorCheckboxes(); saveFormDraft(); updatePreview(); }
function clearColors(){ selectedColors.clear(); syncColorCheckboxes(); saveFormDraft(); updatePreview(); }
function syncColorCheckboxes(){ $('colorGrid').querySelectorAll('input').forEach(i=>{ i.checked = selectedColors.has(i.value); }); }

// ── Sub categories ────────────────────────────────────────────────────────────
function syncSubCats(){
  const main = $('aMainCategory').value;
  const opts = SUB_CATS[main] || SUB_CATS.default;
  const cur = $('aSubCategory').value;
  $('aSubCategory').innerHTML = opts.map(o=>`<option>${o}</option>`).join('');
  if(opts.includes(cur)) $('aSubCategory').value = cur;
}

// ── Size options ──────────────────────────────────────────────────────────────
function getSizesForCat(cat){
  if(cat==='Shoes') return SHOE_SIZES;
  if(['Men','Women','Kids'].includes(cat)) return CLOTH_SIZES;
  return [];
}

function syncSizeOptions(){
  const cat = $('aMainCategory').value;
  const sizes = getSizesForCat(cat);
  $('sizeLabel').textContent = cat==='Shoes' ? 'Shoe Sizes' : sizes.length ? 'Clothing Sizes' : 'Sizes (none for this category)';

  if(!sizes.length){
    $('sizeGrid').innerHTML = '<div class="muted" style="font-size:.85rem;padding:8px">No sizes needed for this category</div>';
    selectedSizes.clear();
    return;
  }

  $('sizeGrid').innerHTML = sizes.map(s=>`
    <div class="sizeBtn ${selectedSizes.has(String(s))?'on':''}" onclick="toggleSize('${s}',this)">${s}</div>
  `).join('');
}

function toggleSize(val, el){
  if(selectedSizes.has(String(val))){ selectedSizes.delete(String(val)); el.classList.remove('on'); }
  else { selectedSizes.add(String(val)); el.classList.add('on'); }
  saveFormDraft(); updatePreview();
}

function selectAllSizes(){
  const cat = $('aMainCategory').value;
  const sizes = getSizesForCat(cat);
  selectedSizes = new Set(sizes.map(String));
  syncSizeButtons(); saveFormDraft(); updatePreview();
}
function clearSizes(){ selectedSizes.clear(); syncSizeButtons(); saveFormDraft(); updatePreview(); }
function syncSizeButtons(){ $('sizeGrid').querySelectorAll('.sizeBtn').forEach(b=>{ b.classList.toggle('on', selectedSizes.has(b.textContent.trim())); }); }

// ── Live preview ──────────────────────────────────────────────────────────────
function updatePreview(){
  const name  = $('aName').value.trim() || 'Product Name';
  const price = $('aPrice').value || '0';
  const desc  = $('aDesc').value.trim() || 'Description...';
  const img   = $('aImg').value.trim();
  const sale  = $('aSale').value.trim();
  const cat   = $('aMainCategory').value;
  const sub   = $('aSubCategory').value;

  $('previewName').textContent = name;
  $('previewDesc').textContent = desc;
  $('previewPrice').textContent = 'R' + price;
  $('previewCat').textContent = cat + (sub && sub!=='All Items' ? ' · '+sub : '');

  const imgEl = $('previewImg');
  if(img){
    imgEl.innerHTML = (sale ? `<div class="preview-badge">${sale}</div>` : '') +
      `<img src="${img}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`;
  } else {
    imgEl.innerHTML = `<div class="muted" style="text-align:center;padding:20px;font-size:.9rem">Enter image URL to preview</div>`;
  }

  const colors = [...selectedColors].slice(0,6);
  $('previewSwatches').innerHTML = colors.map(c=>`<span class="swatch" title="${c}" style="background:${COLOR_MAP[c]||'#666'}"></span>`).join('');
}

// ── Form data ─────────────────────────────────────────────────────────────────
function getFormData(){
  return {
    id: editingId || null,
    name: $('aName').value.trim(),
    price: parseFloat($('aPrice').value) || 0,
    category: $('aMainCategory').value,
    subCategory: $('aSubCategory').value || 'All Items',
    visible: $('aVisible').value === 'true',
    sale: $('aSale').value.trim(),
    img: $('aImg').value.trim(),
    desc: $('aDesc').value.trim(),
    colors: [...selectedColors],
    sizes: [...selectedSizes]
  };
}

function applyToForm(p){
  $('aName').value = p.name || '';
  $('aPrice').value = p.price ?? '';
  $('aMainCategory').value = p.category || 'Shoes';
  syncSubCats();
  $('aSubCategory').value = p.subCategory || 'All Items';
  $('aVisible').value = (p.visible === false) ? 'false' : 'true';
  $('aSale').value = p.sale || '';
  $('aImg').value = p.img || '';
  $('aDesc').value = p.desc || '';
  selectedColors = new Set(Array.isArray(p.colors) ? p.colors : []);
  selectedSizes  = new Set(Array.isArray(p.sizes)  ? p.sizes.map(String)  : []);
  syncColorCheckboxes();
  syncSizeOptions();
  updatePreview();
}

function clearForm(){
  editingId = null;
  $('aName').value=''; $('aPrice').value='';
  $('aMainCategory').value='Shoes'; syncSubCats();
  $('aSubCategory').value='Sneakers';
  $('aVisible').value='true'; $('aSale').value='';
  $('aImg').value=''; $('aDesc').value='';
  selectedColors.clear(); selectedSizes.clear();
  syncColorCheckboxes(); syncSizeOptions();
  updatePreview();
  $('editorTitle').textContent = 'New Product';
  $('editingBadge').classList.add('hidden');
  $('cancelEditBtn').classList.add('hidden');
  localStorage.removeItem(FORM_KEY);
}

function cancelEdit(){ clearForm(); }

function saveFormDraft(){
  const d = { fields: getFormData(), colors: [...selectedColors], sizes: [...selectedSizes], editingId };
  localStorage.setItem(FORM_KEY, JSON.stringify(d));
}

function loadFormDraft(){
  try{
    const raw = localStorage.getItem(FORM_KEY);
    if(!raw) return;
    const d = JSON.parse(raw);
    editingId = d.editingId || null;
    selectedColors = new Set(d.colors || []);
    selectedSizes  = new Set((d.sizes||[]).map(String));
    const f = d.fields || {};
    $('aName').value = f.name || '';
    $('aPrice').value = f.price || '';
    $('aMainCategory').value = f.category || 'Shoes';
    syncSubCats();
    $('aSubCategory').value = f.subCategory || 'All Items';
    $('aVisible').value = String(f.visible !== false);
    $('aSale').value = f.sale || '';
    $('aImg').value = f.img || '';
    $('aDesc').value = f.desc || '';
    syncColorCheckboxes();
    syncSizeOptions();
    if(editingId){
      $('editorTitle').textContent = 'Editing: ' + (f.name||'product');
      $('editingBadge').classList.remove('hidden');
      $('cancelEditBtn').classList.remove('hidden');
    }
    updatePreview();
  }catch(e){ /* ignore */ }
}

// ── Save product ──────────────────────────────────────────────────────────────
function saveProduct(){
  if(!logged){ alert('Unlock admin first'); return; }
  const p = getFormData();
  if(!p.name){ alert('Enter a product name'); $('aName').focus(); return; }
  if(!p.price){ alert('Enter a price'); $('aPrice').focus(); return; }
  if(!p.colors.length) p.colors = ['Black','White'];

  // Defaults if empty sizes
  if(!p.sizes.length && getSizesForCat(p.category).length > 0){
    p.sizes = getSizesForCat(p.category);
  }

  if(editingId){
    const idx = allProducts.findIndex(x=>x.id===editingId);
    if(idx>=0){ allProducts[idx] = { ...allProducts[idx], ...p, id: editingId }; }
    else { allProducts.push({ ...p, id: editingId }); }
  } else {
    allProducts.push({ ...p, id: uid() });
  }

  debounceSave();
  renderProductList();
  clearForm();
  setStatus(`"${p.name}" saved — visible in store immediately`, 'saved');
}

// ── Edit / hide / delete ──────────────────────────────────────────────────────
function editProduct(id){
  const p = allProducts.find(x=>x.id===id);
  if(!p) return;
  editingId = id;
  applyToForm(p);
  saveFormDraft();
  $('editorTitle').textContent = 'Editing: ' + p.name;
  $('editingBadge').classList.remove('hidden');
  $('cancelEditBtn').classList.remove('hidden');
  // Switch to editor tab
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[0].classList.add('active');
  $('tabEditor').classList.remove('hidden');
  $('tabProducts').classList.add('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleVisible(id){
  const p = allProducts.find(x=>x.id===id);
  if(!p) return;
  p.visible = !p.visible;
  debounceSave();
  renderProductList();
}

function deleteProduct(id){
  if(!confirm('Delete this product? This cannot be undone.')) return;
  allProducts = allProducts.filter(x=>x.id!==id);
  if(editingId===id) clearForm();
  debounceSave();
  renderProductList();
}

// ── Bulk actions ──────────────────────────────────────────────────────────────
function toggleSelect(id){
  selectedIds.has(id) ? selectedIds.delete(id) : selectedIds.add(id);
  renderBulkBar();
  // Update checkbox
  const cb = document.querySelector(`.prodCard[data-id="${id}"] .sel-cb`);
  if(cb) cb.checked = selectedIds.has(id);
  // Update card highlight
  const card = document.querySelector(`.prodCard[data-id="${id}"]`);
  if(card) card.classList.toggle('selected', selectedIds.has(id));
}

function toggleSelectAll(){
  const allCbs = document.querySelectorAll('.sel-cb');
  const shouldSelect = $('selectAll').checked;
  allCbs.forEach(cb=>{
    const id = cb.dataset.id;
    shouldSelect ? selectedIds.add(id) : selectedIds.delete(id);
    cb.checked = shouldSelect;
  });
  document.querySelectorAll('.prodCard').forEach(c=>{
    c.classList.toggle('selected', shouldSelect && selectedIds.has(c.dataset.id));
  });
  renderBulkBar();
}

function clearSelection(){ selectedIds.clear(); renderProductList(); $('selectAll').checked=false; }

function renderBulkBar(){
  const n = selectedIds.size;
  $('bulkBar').classList.toggle('hidden', n===0);
  $('bulkCount').textContent = n + ' selected';
}

function bulkHide(){
  selectedIds.forEach(id=>{ const p=allProducts.find(x=>x.id===id); if(p) p.visible=false; });
  debounceSave(); clearSelection();
}
function bulkUnhide(){
  selectedIds.forEach(id=>{ const p=allProducts.find(x=>x.id===id); if(p) p.visible=true; });
  debounceSave(); clearSelection();
}
function bulkDelete(){
  if(!confirm(`Delete ${selectedIds.size} products? This cannot be undone.`)) return;
  allProducts = allProducts.filter(x=>!selectedIds.has(x.id));
  debounceSave(); clearSelection();
}

// ── Product list ──────────────────────────────────────────────────────────────
function getFilteredProducts(){
  const q    = ($('searchAdmin')?.value||'').trim().toLowerCase();
  const cat  = $('filterCat')?.value || '';
  const vis  = $('filterVis')?.value || '';
  let list   = allProducts.slice();
  if(cat)           list = list.filter(p=>p.category===cat);
  if(vis==='visible') list = list.filter(p=>p.visible!==false);
  if(vis==='hidden')  list = list.filter(p=>p.visible===false);
  if(q) list = list.filter(p=>[p.name,p.desc,p.category,p.subCategory,(p.colors||[]).join(' '),(p.sizes||[]).join(' ')].join(' ').toLowerCase().includes(q));
  return list;
}

function renderProductList(){
  if(!logged) return;
  const list = getFilteredProducts();
  $('productCount').textContent = list.length + ' products';
  $('productCountTop').textContent = allProducts.length + ' products';
  renderBulkBar();

  if(!list.length){
    $('productList').innerHTML = '<div class="muted" style="padding:20px;text-align:center">No products found.</div>';
    return;
  }

  $('productList').innerHTML = list.map((p,i)=>{
    const isSel = selectedIds.has(p.id);
    return `<div class="prodCard ${p.visible===false?'hidden-item':''} ${isSel?'selected':''}" data-id="${p.id}" data-idx="${allProducts.indexOf(p)}"
      draggable="true"
      ondragstart="dragStart(event,${allProducts.indexOf(p)})"
      ondragover="dragOver(event)"
      ondrop="dragDrop(event,${allProducts.indexOf(p)})"
      ondragend="dragEnd()">
      <div class="prodTop">
        <input type="checkbox" class="sel-cb" data-id="${p.id}" ${isSel?'checked':''} onchange="toggleSelect('${p.id}')" style="margin-top:4px;cursor:pointer">
        ${p.img?`<img class="prodThumb" src="${p.img}" onerror="this.style.display='none'">`:''}
        <div class="prodInfo">
          <div class="prodName">${p.name}</div>
          <div class="prodMeta">${p.category}${p.subCategory&&p.subCategory!=='All Items'?' · '+p.subCategory:''} · R${p.price}</div>
          <div class="prodMeta">${(p.colors||[]).slice(0,4).join(', ')}${(p.colors||[]).length>4?' …':''}</div>
          <div class="prodMeta">Sizes: ${(p.sizes||[]).join(', ')||'None'}</div>
        </div>
        <span class="badge ${p.visible===false?'gray':''}">${p.visible===false?'Hidden':'Live'}</span>
      </div>
      ${p.sale?`<div style="margin-top:6px"><span class="badge" style="font-size:.7rem">${p.sale}</span></div>`:''}
      <div class="prodActions">
        <button class="smallbtn primary" onclick="editProduct('${p.id}')">✏️ Edit</button>
        <button class="smallbtn" onclick="toggleVisible('${p.id}')">${p.visible===false?'👁 Unhide':'🙈 Hide'}</button>
        <button class="smallbtn danger" onclick="deleteProduct('${p.id}')">🗑 Delete</button>
      </div>
    </div>`;
  }).join('');
}

// ── Drag to reorder ───────────────────────────────────────────────────────────
function dragStart(e, idx){
  dragSrcIdx = idx;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function dragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.prodCard').forEach(c=>c.classList.remove('dragover'));
  e.currentTarget.classList.add('dragover');
}
function dragDrop(e, targetIdx){
  e.preventDefault();
  if(dragSrcIdx===null || dragSrcIdx===targetIdx) return;
  const moved = allProducts.splice(dragSrcIdx, 1)[0];
  allProducts.splice(targetIdx, 0, moved);
  debounceSave();
  renderProductList();
}
function dragEnd(){
  dragSrcIdx = null;
  document.querySelectorAll('.prodCard').forEach(c=>{ c.classList.remove('dragging','dragover'); });
}

// ── Expose globals ────────────────────────────────────────────────────────────
window.login=login;window.saveProduct=saveProduct;window.clearForm=clearForm;window.cancelEdit=cancelEdit;
window.editProduct=editProduct;window.toggleVisible=toggleVisible;window.deleteProduct=deleteProduct;
window.bulkHide=bulkHide;window.bulkUnhide=bulkUnhide;window.bulkDelete=bulkDelete;
window.clearSelection=clearSelection;window.toggleSelectAll=toggleSelectAll;window.toggleSelect=toggleSelect;
window.selectAllColors=selectAllColors;window.clearColors=clearColors;
window.selectAllSizes=selectAllSizes;window.clearSizes=clearSizes;
window.toggleColor=toggleColor;window.toggleSize=toggleSize;
window.syncSubCats=syncSubCats;window.syncSizeOptions=syncSizeOptions;
window.updatePreview=updatePreview;window.saveFormDraft=saveFormDraft;
window.switchTab=switchTab;window.renderProductList=renderProductList;
window.dragStart=dragStart;window.dragOver=dragOver;window.dragDrop=dragDrop;window.dragEnd=dragEnd;
window.reloadProducts=reloadProducts;
</script>
</body>
</html>
